<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blood Bank System Flowcharts</title>
  <style>
    @page {
      size: A4 landscape;
      margin: 10mm;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #1f2937;
      background: #ffffff;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      padding: 16px 20px;
      box-sizing: border-box;
      page-break-after: always;
    }

    .page:last-child {
      page-break-after: auto;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 22px;
      text-align: center;
      color: #991b1b;
    }

    p {
      margin: 0 0 14px;
      font-size: 12px;
      text-align: center;
    }

    svg {
      width: 100%;
      height: auto;
      border: 1px solid #d1d5db;
      background: #fcfcfc;
    }

    .node {
      fill: #ffffff;
      stroke: #111827;
      stroke-width: 1.6;
    }

    .decision {
      fill: #fff7ed;
      stroke: #9a3412;
      stroke-width: 1.6;
    }

    .startend {
      fill: #fee2e2;
      stroke: #991b1b;
      stroke-width: 1.8;
    }

    .process {
      fill: #eff6ff;
      stroke: #1d4ed8;
      stroke-width: 1.6;
    }

    .data {
      fill: #ecfdf5;
      stroke: #047857;
      stroke-width: 1.6;
    }

    .label {
      font-size: 12px;
      font-weight: bold;
      fill: #111827;
      text-anchor: middle;
    }

    .small {
      font-size: 11px;
      font-weight: normal;
    }

    .arrow {
      stroke: #374151;
      stroke-width: 1.6;
      fill: none;
      marker-end: url(#arrowhead);
    }

    .legend {
      font-size: 11px;
      fill: #4b5563;
    }
  </style>
</head>
<body><section class="page">
    <h1>User Flowchart</h1>
    <p>Blood Bank and Donor Management System: donor registration, donor search, blood request, and donor account process.</p>
    <svg viewBox="0 0 1120 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="User flowchart">
      <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#374151"></polygon>
        </marker>
      </defs>

      <ellipse class="startend" cx="560" cy="36" rx="58" ry="20"></ellipse>
      <text class="label" x="560" y="40">Start</text>

      <rect class="process" x="470" y="72" width="180" height="44" rx="10"></rect>
      <text class="label" x="560" y="99">Access Website</text>

      <path class="arrow" d="M560 56 L560 72"></path>

      <polygon class="decision" points="560,132 650,184 560,236 470,184"></polygon>
      <text class="label" x="560" y="178">Choose</text>
      <text class="label small" x="560" y="194">User Action</text>

      <path class="arrow" d="M560 116 L560 132"></path>

      <rect class="process" x="48" y="270" width="220" height="54" rx="10"></rect>
      <text class="label" x="158" y="292">Browse Public Pages</text>
      <text class="label small" x="158" y="308">Home / About / Contact</text>

      <rect class="process" x="308" y="270" width="220" height="54" rx="10"></rect>
      <text class="label" x="418" y="292">View Donor List</text>
      <text class="label small" x="418" y="308">Active donor records</text>

      <rect class="process" x="592" y="270" width="220" height="54" rx="10"></rect>
      <text class="label" x="702" y="292">Register as Donor</text>
      <text class="label small" x="702" y="308">Create donor account</text>

      <rect class="process" x="852" y="270" width="220" height="54" rx="10"></rect>
      <text class="label" x="962" y="292">Login as Donor</text>
      <text class="label small" x="962" y="308">Email and password</text>

      <path class="arrow" d="M500 204 L158 270"></path>
      <path class="arrow" d="M530 216 L418 270"></path>
      <path class="arrow" d="M590 216 L702 270"></path>
      <path class="arrow" d="M620 204 L962 270"></path>

      <rect class="process" x="308" y="370" width="220" height="54" rx="10"></rect>
      <text class="label" x="418" y="392">Search Donor</text>
      <text class="label small" x="418" y="408">Blood group and location</text>

      <path class="arrow" d="M418 324 L418 370"></path>

      <rect class="data" x="308" y="462" width="220" height="54" rx="10"></rect>
      <text class="label" x="418" y="484">Search Donor Records</text>
      <text class="label small" x="418" y="500">Using blood group / location input</text>

      <path class="arrow" d="M418 424 L418 462"></path>

      <polygon class="decision" points="418,536 508,588 418,640 328,588"></polygon>
      <text class="label" x="418" y="582">Match Found?</text>

      <path class="arrow" d="M418 516 L418 536"></path>

      <rect class="process" x="88" y="562" width="172" height="52" rx="10"></rect>
      <text class="label" x="174" y="584">Show "No Record"</text>
      <text class="label small" x="174" y="600">Return to search/list</text>

      <rect class="process" x="572" y="562" width="192" height="52" rx="10"></rect>
      <text class="label" x="668" y="584">Display Donor Details</text>
      <text class="label small" x="668" y="600">Name, blood group, contact</text>

      <path class="arrow" d="M328 588 L260 588"></path>
      <text class="legend" x="280" y="578">No</text>
      <path class="arrow" d="M508 588 L572 588"></path>
      <text class="legend" x="534" y="578">Yes</text>

      <polygon class="decision" points="668,268 760,320 668,372 576,320"></polygon>
      <text class="label" x="668" y="314">Send Blood</text>
      <text class="label small" x="668" y="330">Request?</text>

      <path class="arrow" d="M668 562 L668 372"></path>

      <rect class="process" x="834" y="294" width="230" height="54" rx="10"></rect>
      <text class="label" x="949" y="316">Open Contact for Blood</text>
      <text class="label small" x="949" y="332">Request form</text>

      <path class="arrow" d="M760 320 L834 320"></path>
      <text class="legend" x="786" y="310">Yes</text>

      <rect class="data" x="834" y="386" width="230" height="60" rx="10"></rect>
      <text class="label" x="949" y="408">Save Request</text>
      <text class="label small" x="949" y="424">Name, contact no., email,</text>
      <text class="label small" x="949" y="438">blood required for, message</text>

      <path class="arrow" d="M949 348 L949 386"></path>

      <rect class="process" x="834" y="486" width="230" height="54" rx="10"></rect>
      <text class="label" x="949" y="508">Request Sent</text>
      <text class="label small" x="949" y="524">Confirmation message</text>

      <path class="arrow" d="M949 446 L949 486"></path>

      <rect class="process" x="570" y="78" width="230" height="54" rx="10" visibility="hidden"></rect>

      <rect class="data" x="580" y="82" width="220" height="58" rx="10" visibility="hidden"></rect>

      <rect class="data" x="590" y="370" width="224" height="64" rx="10"></rect>
      <text class="label" x="702" y="392">Create Donor Record</text>
      <text class="label small" x="702" y="408">Save name, mobile, email, age,</text>
      <text class="label small" x="702" y="422">gender, blood group, address</text>

      <path class="arrow" d="M702 324 L702 370"></path>

      <rect class="process" x="590" y="466" width="224" height="54" rx="10"></rect>
      <text class="label" x="702" y="488">Registration Successful</text>
      <text class="label small" x="702" y="504">Donor can now log in</text>

      <path class="arrow" d="M702 434 L702 466"></path>

      <polygon class="decision" points="962,370 1052,422 962,474 872,422"></polygon>
      <text class="label" x="962" y="416">Valid Login?</text>

      <path class="arrow" d="M962 324 L962 370"></path>

      <rect class="process" x="864" y="536" width="196" height="54" rx="10"></rect>
      <text class="label" x="962" y="558">Logged-in Donor</text>
      <text class="label small" x="962" y="574">My Account menu options</text>

      <path class="arrow" d="M962 474 L962 536"></path>
      <text class="legend" x="986" y="498">Yes</text>

      <path class="arrow" d="M872 422 L820 422 L820 324 L852 324"></path>
      <text class="legend" x="830" y="412">No</text>

      <rect class="process" x="818" y="626" width="288" height="52" rx="10"></rect>
      <text class="label" x="962" y="648">Manage Profile / Change Password /</text>
      <text class="label small" x="962" y="664">View Requests Received / Logout</text>

      <path class="arrow" d="M962 590 L962 626"></path>

      <ellipse class="startend" cx="174" cy="666" rx="58" ry="20"></ellipse>
      <text class="label" x="174" y="670">End</text>

      <ellipse class="startend" cx="702" cy="666" rx="58" ry="20"></ellipse>
      <text class="label" x="702" y="670">End</text>

      <ellipse class="startend" cx="949" cy="696" rx="58" ry="20" visibility="hidden"></ellipse>

      <path class="arrow" d="M174 614 L174 646"></path>
      <path class="arrow" d="M702 520 L702 646"></path>
      <path class="arrow" d="M949 540 L1040 540 L1040 666 L760 666"></path>
      <path class="arrow" d="M576 320 L560 320 L560 666 L644 666"></path>
      <text class="legend" x="572" y="310">No</text>
    </svg>
  </section></body></html>
