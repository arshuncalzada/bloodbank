<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blood Bank System Flowcharts</title>
  <style>
    @page {
      size: A4 landscape;
      margin: 10mm;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #1f2937;
      background: #ffffff;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      padding: 16px 20px;
      box-sizing: border-box;
      page-break-after: always;
    }

    .page:last-child {
      page-break-after: auto;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 22px;
      text-align: center;
      color: #991b1b;
    }

    p {
      margin: 0 0 14px;
      font-size: 12px;
      text-align: center;
    }

    svg {
      width: 100%;
      height: auto;
      border: 1px solid #d1d5db;
      background: #fcfcfc;
    }

    .node {
      fill: #ffffff;
      stroke: #111827;
      stroke-width: 1.6;
    }

    .decision {
      fill: #fff7ed;
      stroke: #9a3412;
      stroke-width: 1.6;
    }

    .startend {
      fill: #fee2e2;
      stroke: #991b1b;
      stroke-width: 1.8;
    }

    .process {
      fill: #eff6ff;
      stroke: #1d4ed8;
      stroke-width: 1.6;
    }

    .data {
      fill: #ecfdf5;
      stroke: #047857;
      stroke-width: 1.6;
    }

    .label {
      font-size: 12px;
      font-weight: bold;
      fill: #111827;
      text-anchor: middle;
    }

    .small {
      font-size: 11px;
      font-weight: normal;
    }

    .arrow {
      stroke: #374151;
      stroke-width: 1.6;
      fill: none;
      marker-end: url(#arrowhead);
    }

    .legend {
      font-size: 11px;
      fill: #4b5563;
    }
  </style>
</head>
<body><section class="page">
    <h1>Admin Flowchart</h1>
    <p>Blood Bank and Donor Management System: admin authentication, dashboard, and record management flow.</p>
    <svg viewBox="0 0 1120 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Admin flowchart">
      <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#374151"></polygon>
        </marker>
      </defs>

      <ellipse class="startend" cx="560" cy="36" rx="58" ry="20"></ellipse>
      <text class="label" x="560" y="40">Start</text>

      <rect class="process" x="450" y="72" width="220" height="52" rx="10"></rect>
      <text class="label" x="560" y="94">Open Admin Login</text>
      <text class="label small" x="560" y="110">Username and password</text>

      <path class="arrow" d="M560 56 L560 72"></path>

      <polygon class="decision" points="560,148 650,200 560,252 470,200"></polygon>
      <text class="label" x="560" y="194">Valid Admin</text>
      <text class="label small" x="560" y="210">Account?</text>

      <path class="arrow" d="M560 124 L560 148"></path>

      <path class="arrow" d="M470 200 L400 200 L400 98 L450 98"></path>
      <text class="legend" x="410" y="190">No</text>

      <rect class="process" x="450" y="284" width="220" height="54" rx="10"></rect>
      <text class="label" x="560" y="306">Open Dashboard</text>
      <text class="label small" x="560" y="322">Admin summary counts</text>

      <path class="arrow" d="M560 252 L560 284"></path>
      <text class="legend" x="586" y="268">Yes</text>

      <polygon class="decision" points="560,366 650,420 560,474 470,420"></polygon>
      <text class="label" x="560" y="414">Choose</text>
      <text class="label small" x="560" y="430">Admin Module</text>

      <path class="arrow" d="M560 338 L560 366"></path>

      <rect class="process" x="34" y="540" width="158" height="58" rx="10"></rect>
      <text class="label" x="113" y="562">Manage Blood</text>
      <text class="label small" x="113" y="578">Groups</text>

      <rect class="process" x="212" y="540" width="158" height="58" rx="10"></rect>
      <text class="label" x="291" y="562">Manage Donor</text>
      <text class="label small" x="291" y="578">List</text>

      <rect class="process" x="390" y="540" width="158" height="58" rx="10"></rect>
      <text class="label" x="469" y="562">Manage Contact</text>
      <text class="label small" x="469" y="578">Queries</text>

      <rect class="process" x="568" y="540" width="158" height="58" rx="10"></rect>
      <text class="label" x="647" y="562">Manage Pages</text>
      <text class="label small" x="647" y="578">Site content</text>

      <rect class="process" x="746" y="540" width="158" height="58" rx="10"></rect>
      <text class="label" x="825" y="562">Update Contact</text>
      <text class="label small" x="825" y="578">Info</text>

      <rect class="process" x="924" y="540" width="158" height="58" rx="10"></rect>
      <text class="label" x="1003" y="562">Blood Requests /</text>
      <text class="label small" x="1003" y="578">Search Request</text>

      <path class="arrow" d="M496 446 L113 540"></path>
      <path class="arrow" d="M516 460 L291 540"></path>
      <path class="arrow" d="M545 472 L469 540"></path>
      <path class="arrow" d="M575 472 L647 540"></path>
      <path class="arrow" d="M604 460 L825 540"></path>
      <path class="arrow" d="M624 446 L1003 540"></path>

      <rect class="data" x="22" y="628" width="182" height="58" rx="10"></rect>
      <text class="label" x="113" y="650">Add / View Blood</text>
      <text class="label small" x="113" y="666">Group records</text>

      <rect class="data" x="200" y="620" width="182" height="74" rx="10"></rect>
      <text class="label" x="291" y="642">View donors, hide,</text>
      <text class="label small" x="291" y="658">make public, delete,</text>
      <text class="label small" x="291" y="672">download donor list</text>

      <rect class="data" x="388" y="628" width="162" height="58" rx="10"></rect>
      <text class="label" x="469" y="650">View, mark read,</text>
      <text class="label small" x="469" y="666">or delete queries</text>

      <rect class="data" x="556" y="628" width="182" height="58" rx="10"></rect>
      <text class="label" x="647" y="650">Edit About / other</text>
      <text class="label small" x="647" y="666">site page details</text>

      <rect class="data" x="734" y="620" width="182" height="74" rx="10"></rect>
      <text class="label" x="825" y="642">Update address,</text>
      <text class="label small" x="825" y="658">email, contact number</text>
      <text class="label small" x="825" y="672">shown on the website</text>

      <rect class="data" x="912" y="620" width="182" height="74" rx="10"></rect>
      <text class="label" x="1003" y="642">View all blood requests</text>
      <text class="label small" x="1003" y="658">or search donor /</text>
      <text class="label small" x="1003" y="672">requirer records</text>

      <path class="arrow" d="M113 598 L113 628"></path>
      <path class="arrow" d="M291 598 L291 620"></path>
      <path class="arrow" d="M469 598 L469 628"></path>
      <path class="arrow" d="M647 598 L647 628"></path>
      <path class="arrow" d="M825 598 L825 620"></path>
      <path class="arrow" d="M1003 598 L1003 620"></path>

      <rect class="process" x="438" y="628" width="0" height="0" rx="0" visibility="hidden"></rect>
      <rect class="process" x="470" y="76" width="0" height="0" rx="0" visibility="hidden"></rect>

      <rect class="process" x="466" y="540" width="188" height="0" rx="0" visibility="hidden"></rect>

      <rect class="process" x="426" y="628" width="268" height="58" rx="10" visibility="hidden"></rect>

      <rect class="process" x="466" y="76" width="188" height="58" rx="10" visibility="hidden"></rect>

      <rect class="process" x="450" y="500" width="220" height="0" rx="0" visibility="hidden"></rect>

      <rect class="process" x="456" y="540" width="208" height="58" rx="10" visibility="hidden"></rect>

      <rect class="process" x="458" y="72" width="204" height="50" rx="10" visibility="hidden"></rect>

      <rect class="process" x="414" y="628" width="292" height="58" rx="10" visibility="hidden"></rect>

      <rect class="process" x="456" y="72" width="0" height="0" rx="0" visibility="hidden"></rect>

      <rect class="process" x="406" y="628" width="308" height="58" rx="10" visibility="hidden"></rect>

      <rect class="process" x="452" y="72" width="216" height="52" rx="10" visibility="hidden"></rect>

      <ellipse class="startend" cx="560" cy="706" rx="58" ry="20"></ellipse>
      <text class="label" x="560" y="710">End</text>

      <path class="arrow" d="M113 686 L113 706 L560 706"></path>
      <path class="arrow" d="M291 694 L291 706"></path>
      <path class="arrow" d="M469 686 L469 706"></path>
      <path class="arrow" d="M647 686 L647 706"></path>
      <path class="arrow" d="M825 694 L825 706"></path>
      <path class="arrow" d="M1003 694 L1003 706 L618 706"></path>
    </svg>
  </section></body></html>
